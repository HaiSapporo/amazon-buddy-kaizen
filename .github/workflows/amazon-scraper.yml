name: Amazon Buddy Scraper

on:
  workflow_dispatch:

  # Mỗi ngày 6:00 JST = 21:00 UTC hôm trước
  schedule:
    - cron: '0 21 * * *'

jobs:
  scrape:
    name: "[${{ matrix.index }}] ${{ matrix.keyword }}"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      max-parallel: 1      # tuần tự — không chạy đồng thời
      fail-fast: false     # job sau vẫn chạy dù job trước lỗi
      matrix:
        include:
          - { index: 1, keyword: 'アディダス',    delay_min: 0  }
          - { index: 2, keyword: 'ナイキ',        delay_min: 8  }
          - { index: 3, keyword: 'プーマ',        delay_min: 16 }
          - { index: 4, keyword: 'ニューバランス', delay_min: 24 }
          - { index: 5, keyword: 'アシックス',    delay_min: 32 }
          - { index: 6, keyword: 'レイバン',      delay_min: 40 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Cài đặt dependencies
        run: npm install

      # Delay tăng dần — mỗi keyword cách nhau ~8 phút, IP VM khác nhau
      - name: "⏳ Delay ${{ matrix.delay_min }} phút (chống block)"
        if: matrix.delay_min > 0
        run: |
          echo "Chờ ${{ matrix.delay_min }} phút trước khi scrape '${{ matrix.keyword }}'..."
          sleep $(( ${{ matrix.delay_min }} * 60 ))

      - name: "🚀 Scrape: ${{ matrix.keyword }}"
        env:
          KEYWORD: ${{ matrix.keyword }}
        run: |
          echo "Bắt đầu: '${{ matrix.keyword }}'"
          node run.js
          echo "--- content-output/ ---"
          ls -lh content-output/ | tail -5

      # ── Commit file CSV vào repo scraper (để lưu trữ) ──
      - name: Commit CSV vào amazon-buddy-kaizen
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git pull --rebase origin main || true
          git add content-output/
          if git diff --cached --quiet; then
            echo "⚠️  Không có CSV mới."
          else
            git commit -m "csv: ${{ matrix.keyword }} - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin main
          fi

      # ── Push file JSON sang collectsaleamazonjapan/src/content/ ──
      - name: "📤 Push JSON → collectsaleamazonjapan"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # Clone repo web
          git clone https://x-access-token:${GH_PAT}@github.com/HaiSapporo/collectsaleamazonjapan.git /tmp/web_repo

          # Copy tất cả file JSON mới vào src/content/
          JSON_FILES=$(ls content-output/*.json 2>/dev/null)
          if [ -z "$JSON_FILES" ]; then
            echo "⚠️  Không có file JSON nào để push."
            exit 0
          fi

          cp content-output/*.json /tmp/web_repo/src/content/
          echo "📄 Files copied:"
          ls content-output/*.json

          cd /tmp/web_repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add src/content/
          if git diff --cached --quiet; then
            echo "⚠️  Không có thay đổi mới."
          else
            git commit -m "data: ${{ matrix.keyword }} - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ Đã push JSON vào collectsaleamazonjapan/src/content/"
          fi

  summary:
    name: Tổng kết
    needs: scrape
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Tóm tắt
        run: |
          echo "## 📊 Scraping $(date -u '+%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| # | Keyword | Kết quả |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1 | アディダス    | ${{ needs.scrape.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 2 | ナイキ        | ${{ needs.scrape.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3 | プーマ        | ${{ needs.scrape.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 4 | ニューバランス | ${{ needs.scrape.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 5 | アシックス    | ${{ needs.scrape.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 6 | レイバン      | ${{ needs.scrape.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📁 JSON → \`collectsaleamazonjapan/src/content/\` → Cloudflare Pages rebuild" >> $GITHUB_STEP_SUMMARY
