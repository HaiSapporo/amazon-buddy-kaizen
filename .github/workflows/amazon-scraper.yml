name: Amazon Buddy Scraper

on:
  # ✅ Chạy thủ công (trigger bằng tay từ GitHub UI)
  workflow_dispatch:

  # ✅ Chạy tự động theo lịch — chỉnh cron để đổi giờ
  schedule:
    - cron: '0 1 * * 1'   # Mỗi thứ Hai 01:00 UTC (10:00 JST)
    # - cron: '0 1 * * *' # Mỗi ngày 01:00 UTC
    # - cron: '0 1 * * 1,4' # Thứ Hai + Thứ Năm

jobs:
  scrape:
    name: Run scraper (run.js)
    runs-on: ubuntu-latest
    permissions:
      contents: write    # cho phép commit & push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Cài đặt dependencies
        run: npm install

      - name: Chạy run.js (scrape tất cả keyword)
        run: |
          echo "🚀 Bắt đầu scraping..."
          node run.js
          echo "--- Danh sách file trong content-output/ ---"
          ls -lh content-output/ || echo "(thư mục rỗng)"

      - name: Commit và push file output về repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git

          # Pull trước để tránh conflict
          git pull --rebase origin main || true

          git add content-output/

          if git diff --cached --quiet; then
            echo "⚠️  Không có file mới để commit."
          else
            git commit -m "data: scrape $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin main
            echo "✅ Đã push file về repo!"
          fi

  summary:
    name: Tổng kết
    needs: scrape
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Tóm tắt kết quả
        run: |
          echo "## 📊 Kết quả Scraping" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Trạng thái | Chi tiết |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ needs.scrape.result == 'success' && '✅ Thành công' || '❌ Thất bại' }} | ${{ needs.scrape.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🕐 Thời gian | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📁 File lưu tại **content-output/** trong repo — xem [JOBS trong run.js](run.js)" >> $GITHUB_STEP_SUMMARY
